<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 조 편성 프로그램</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f0f4f8;
        }

        .group-card {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .group-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .shuffling {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .student-slot {
            background: rgba(255, 255, 255, 0.8);
            border: 1px dashed #cbd5e1;
        }

        .revealed {
            background: white;
            border-style: solid;
            border-color: #3b82f6;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .excluded-btn.active {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">🎲 랜덤 조 편성 타임!</h1>
            <p id="statsDisplay" class="text-slate-500 font-medium">총 48명 / 4인 1조 (12개 조)</p>
            
            <div class="mt-6 flex flex-wrap justify-center gap-3">
                <button id="startBtn" onclick="startShuffling()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95">
                    조 편성 시작하기
                </button>
                <button onclick="toggleExcludeModal()" class="px-6 py-3 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold rounded-full shadow-sm transition-all">
                    🚫 제외 번호 설정
                </button>
                <button id="resetBtn" onclick="resetAll()" class="px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-full transition-all">
                    초기화
                </button>
            </div>
        </div>

        <!-- Exclusion Modal -->
        <div id="excludeModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold">결석/제외 인원 선택</h2>
                    <button onclick="toggleExcludeModal()" class="text-slate-400 hover:text-slate-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <p class="text-sm text-slate-500 mb-4">제외할 학생의 번호를 클릭하세요. 빨간색은 제외된 번호입니다.</p>
                <div id="numberPicker" class="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-2 mb-6 max-h-60 overflow-y-auto p-2">
                    <!-- Numbers generated by JS -->
                </div>
                <div class="flex justify-end">
                    <button onclick="applyExclusions()" class="px-8 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-all">
                        설정 완료
                    </button>
                </div>
            </div>
        </div>

        <!-- Group Grid -->
        <div id="groupGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Dynamically generated -->
        </div>
    </div>

    <script>
        const INITIAL_TOTAL = 48;
        const STUDENTS_PER_GROUP = 4;
        
        let excludedStudents = new Set();
        let isProcessing = false;

        // Web Audio API context for sound effects
        let audioCtx = null;

        // Play a simple beep sound to avoid external file loading errors
        function playBeep(frequency = 440, duration = 0.1) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.error("Audio playback failed:", e);
            }
        }

        function toggleExcludeModal() {
            if (isProcessing) return;
            const modal = document.getElementById('excludeModal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                renderNumberPicker();
            }
        }

        function renderNumberPicker() {
            const container = document.getElementById('numberPicker');
            container.innerHTML = '';
            for (let i = 1; i <= INITIAL_TOTAL; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `excluded-btn h-10 border rounded-lg font-medium transition-all ${excludedStudents.has(i) ? 'active' : 'bg-slate-50 border-slate-200 text-slate-600 hover:border-blue-400'}`;
                btn.onclick = () => {
                    if (excludedStudents.has(i)) excludedStudents.delete(i);
                    else excludedStudents.add(i);
                    btn.classList.toggle('active');
                    btn.classList.toggle('bg-slate-50');
                    playBeep(660, 0.05);
                };
                container.appendChild(btn);
            }
        }

        function applyExclusions() {
            toggleExcludeModal();
            updateStats();
            initGrid();
        }

        function updateStats() {
            const currentTotal = INITIAL_TOTAL - excludedStudents.size;
            const groupCount = Math.ceil(currentTotal / STUDENTS_PER_GROUP);
            document.getElementById('statsDisplay').innerText = `현재 인원: ${currentTotal}명 (제외: ${excludedStudents.size}명) / ${groupCount}개 조 편성 예정`;
        }

        function initGrid() {
            const grid = document.getElementById('groupGrid');
            grid.innerHTML = '';
            
            const currentTotal = INITIAL_TOTAL - excludedStudents.size;
            const groupCount = Math.ceil(currentTotal / STUDENTS_PER_GROUP);

            for (let i = 1; i <= groupCount; i++) {
                const groupCard = document.createElement('div');
                groupCard.className = `group-card bg-white rounded-2xl shadow-sm border border-slate-200 p-5`;
                groupCard.id = `group-${i}`;
                
                let slotsHtml = '';
                const slotsInThisGroup = (i === groupCount && currentTotal % STUDENTS_PER_GROUP !== 0) 
                                        ? currentTotal % STUDENTS_PER_GROUP 
                                        : STUDENTS_PER_GROUP;

                for (let s = 0; s < slotsInThisGroup; s++) {
                    slotsHtml += `<div class="student-slot h-12 flex items-center justify-center rounded-lg text-slate-300">?</div>`;
                }

                groupCard.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <span class="text-lg font-bold text-blue-600">${i}조</span>
                        <span class="text-xs text-slate-400">TEAM ${String(i).padStart(2, '0')}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2" id="group-slots-${i}">
                        ${slotsHtml}
                    </div>
                `;
                grid.appendChild(groupCard);
                setTimeout(() => groupCard.classList.add('visible'), i * 50);
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function startShuffling() {
            if (isProcessing) return;
            
            const activeStudents = [];
            for (let i = 1; i <= INITIAL_TOTAL; i++) {
                if (!excludedStudents.has(i)) activeStudents.push(i);
            }

            if (activeStudents.length === 0) {
                return;
            }

            isProcessing = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "편성 중...";

            const shuffledStudents = shuffle([...activeStudents]);
            const groupCount = Math.ceil(shuffledStudents.length / STUDENTS_PER_GROUP);
            
            let studentCounter = 0;

            for (let g = 0; g < groupCount; g++) {
                const groupNum = g + 1;
                const card = document.getElementById(`group-${groupNum}`);
                const slotsContainer = document.getElementById(`group-slots-${groupNum}`);
                const slots = slotsContainer.querySelectorAll('.student-slot');
                
                card.classList.add('shuffling', 'ring-4', 'ring-blue-400', 'z-10');
                playBeep(330, 0.2);
                await new Promise(resolve => setTimeout(resolve, 500));
                card.classList.remove('shuffling', 'ring-4', 'ring-blue-400', 'z-10');

                for (let s = 0; s < slots.length; s++) {
                    if (studentCounter < shuffledStudents.length) {
                        const studentNum = shuffledStudents[studentCounter++];
                        slots[s].innerText = `${studentNum}번`;
                        slots[s].classList.add('revealed', 'font-bold', 'text-slate-800');
                        slots[s].classList.remove('text-slate-300');
                        
                        playBeep(523.25, 0.1); // C5 note
                        
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 200));
            }

            document.getElementById('startBtn').innerText = "편성 완료!";
            isProcessing = false;
        }

        function resetAll() {
            if (isProcessing) return;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "조 편성 시작하기";
            initGrid();
        }

        window.onload = () => {
            updateStats();
            initGrid();
        };
    </script>
</body>
</html>
